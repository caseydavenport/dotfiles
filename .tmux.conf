# don't rename windows automatically
set-option -g allow-rename off

# Use vi bindings
set-window-option -g mode-keys vi
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Use zsh
set -g default-command /usr/bin/zsh

# Toggle synchronization
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# Pane resizing: prefix + H/J/K/L to resize in 5-cell increments (repeatable).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane zoom toggle: Alt+z (no prefix needed).
bind-key -n 'M-z' resize-pane -Z

# Window switching: Alt+m/n for left/right (no prefix needed).
bind-key -n 'M-n' previous-window
bind-key -n 'M-m' next-window

# vim-tmux-navigator: seamless Alt+h/j/k/l across vim splits and tmux panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'
bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R

######################
### DESIGN CHANGES ###
######################

# History limit
set-option -g history-limit 50000

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# Auto-renumber windows when one is closed
set -g renumber-windows on

# Faster escape time for snappy vim usage
set -sg escape-time 10

# Focus events for vim autoread and focus detection
set -g focus-events on

############################
### Terminal capabilities ###
############################

set -g default-terminal "tmux-256color"

# True color (24-bit) support
set -ga terminal-overrides ",xterm-256color:Tc,tmux-256color:Tc"

# Undercurl support (for nvim diagnostics, etc.)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

############################
### Catppuccin Mocha Theme #
############################

# Color palette variables (for readability)
# Lavender:  colour183  |  Sky:     colour117
# Surface0:  colour235  |  Surface1: colour238
# Text:      colour189  |  Subtext:  colour248
# Base:      colour234  |  Mantle:   colour236
# Peach:     colour209  |  Green:    colour114

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour183

# Dim inactive pane content, active pane keeps default look
setw -g window-style fg=colour245,bg=colour236
setw -g window-active-style fg=colour253,bg=colour234

# Modes
setw -g clock-mode-colour colour183
setw -g mode-style fg=colour235,bg=colour183,bold

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style bg=colour235,fg=colour189
set -g status-left-length 40
set -g status-right-length 120

# Status left: session name with powerline separator
set -g status-left '#[fg=colour235,bg=colour183,bold] #S #[fg=colour183,bg=colour235]'

# Status right: sync indicator, k8s context, date, time
# Sync panes indicator: shows SYNC in peach when panes are synchronized
# K8s context: shows current kubectl context and namespace
set -g status-right '#{?pane_synchronized,#[fg=colour235]#[fg=colour235#,bg=colour209#,bold] SYNC #[fg=colour209#,bg=colour235],}#[fg=colour238,bg=colour235]#[fg=colour189,bg=colour238] #(kubectl config current-context 2>/dev/null || echo "no-ctx"):#(kubectl config view --minify --output "jsonpath={..namespace}" 2>/dev/null || echo "default") #[fg=colour117,bg=colour238]#[fg=colour235,bg=colour117] %d/%m #[fg=colour183,bg=colour117]#[fg=colour235,bg=colour183,bold] %H:%M '

# Window status with powerline separators
setw -g window-status-current-format '#[fg=colour235,bg=colour183]#[fg=colour235,bg=colour183,bold] #I:#W #[fg=colour183,bg=colour235]'
setw -g window-status-format '#[fg=colour235,bg=colour238]#[fg=colour248,bg=colour238] #I:#W #[fg=colour238,bg=colour235]'
setw -g window-status-bell-style fg=colour255,bg=colour1,bold

# Separator between windows
setw -g window-status-separator ''

# Messages
set -g message-style fg=colour235,bg=colour183
set -g message-command-style fg=colour235,bg=colour117
