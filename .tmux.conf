# don't rename windows automatically
set-option -g allow-rename off

# Use vi bindings
set-window-option -g mode-keys vi
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Use zsh
set -g default-command /usr/bin/zsh

# Toggle synchronization
bind e setw synchronize-panes on
bind E setw synchronize-panes off

######################
### DESIGN CHANGES ###
######################

# History limit
set-option -g history-limit 50000

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

set -g default-terminal "screen-256color"

############################
### Catppuccin Mocha Theme #
############################

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour183

# Dim inactive pane content, active pane keeps default look
setw -g window-style fg=colour245,bg=colour236
setw -g window-active-style fg=colour253,bg=colour234

# Modes
setw -g clock-mode-colour colour183
setw -g mode-style fg=colour235,bg=colour183,bold

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-interval 2
set -g status-style bg=colour235,fg=colour189
set -g status-left '#[fg=colour235,bg=colour183,bold] #S #[fg=colour183,bg=colour235] '
set -g status-right '#[fg=colour189,bg=colour235] %d/%m #[fg=colour235,bg=colour117,bold] %H:%M '
set -g status-right-length 50
set -g status-left-length 20

# Window status
setw -g window-status-current-format '#[fg=colour235,bg=colour183,bold] #I:#W '
setw -g window-status-format '#[fg=colour248,bg=colour235] #I:#W '
setw -g window-status-bell-style fg=colour255,bg=colour1,bold

# Messages
set -g message-style fg=colour235,bg=colour183
set -g message-command-style fg=colour235,bg=colour117
