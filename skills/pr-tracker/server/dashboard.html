<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PR Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%2358a6ff'><circle cx='4' cy='4' r='2'/><circle cx='4' cy='12' r='2'/><circle cx='12' cy='12' r='2'/><path d='M4 6v4M12 10V7a3 3 0 0 0-3-3H7' stroke='%2358a6ff' stroke-width='1.5' fill='none'/></svg>">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --link: #58a6ff;
    --state-mergeable: #2da44e;
    --state-needs-review: #bf8700;
    --state-reviewed: #cf222e;
    --state-needs-work: #cf222e;
    --state-draft: #768390;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    line-height: 1.4;
  }
  a { color: var(--link); text-decoration: none; font-weight: 600; }
  a:hover { text-decoration: underline; }

  .header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .header h1 { font-size: 22px; }
  .header .subtitle { color: var(--text-muted); font-size: 13px; }

  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: transparent;
    transition: color 0.15s, background 0.15s;
    user-select: none;
    position: relative;
    bottom: -1px;
  }
  .tab:hover { color: var(--text); background: var(--surface); }
  .tab.active {
    color: var(--text);
    background: var(--bg);
    border-color: var(--border);
    border-bottom-color: var(--bg);
  }
  .tab .tab-count {
    font-size: 11px;
    font-weight: normal;
    color: var(--text-muted);
    background: var(--surface);
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-group {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .filter-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-right: 4px;
    user-select: none;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active { background: var(--surface); border-color: var(--text-muted); color: var(--text); }
  .filter-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 4px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
    min-height: 200px;
  }
  .board.board-3col {
    grid-template-columns: repeat(3, 1fr);
  }
  .column {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    min-height: 200px;
    transition: border-color 0.15s;
    overflow: hidden;
  }
  .column.drag-over {
    border-color: var(--link);
    background: #161b2280;
  }
  .column-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
    border-top: 3px solid currentColor;
  }
  .column-header .count {
    font-weight: normal;
    color: var(--text-muted);
    font-size: 12px;
  }
  .column-cards {
    flex: 1;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    min-height: 60px;
  }

  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 6px;
    padding: 10px 10px 8px;
    cursor: grab;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card:hover { border-color: var(--text-muted); }
  .card.dragging { opacity: 0.4; cursor: grabbing; }
  .card.changed {
    border-color: var(--link);
    box-shadow: 0 0 0 1px var(--link);
  }
  .card.no-drag { cursor: default; }
  .card.state-mergeable {
    background: #2da44e30;
    border-left-color: var(--state-mergeable);
    box-shadow: 0 0 10px #2da44e35;
  }
  .card.state-mergeable:not(.changed):not(:hover) {
    animation: mergeableGlow 3s ease-in-out infinite;
  }
  .card.state-needs-review {
    background: #bf870028;
    border-left-color: var(--state-needs-review);
  }
  .card.state-reviewed {
    background: #cf222e28;
    border-left-color: var(--state-reviewed);
  }
  .card.state-needs-work {
    background: #cf222e28;
    border-left-color: var(--state-needs-work);
  }
  .card.state-draft {
    background: #76839022;
    border-left-color: var(--state-draft);
  }
  @keyframes mergeableGlow {
    0%, 100% { box-shadow: 0 0 10px #2da44e35; }
    50% { box-shadow: 0 0 18px #2da44e55; }
  }
  .card.ready-to-merge {
    position: relative;
    overflow: hidden;
  }
  .card.ready-to-merge::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 30%,
      rgba(45, 164, 78, 0.1) 45%,
      rgba(63, 185, 80, 0.15) 50%,
      rgba(45, 164, 78, 0.1) 55%,
      transparent 70%
    );
    animation: shimmer 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  .card.untriaged {
    border-image: linear-gradient(135deg, #58a6ff, #a371f7, #58a6ff) 1;
    border-left: 3px solid;
    border-image: none;
    border-color: #a371f7;
    position: relative;
    overflow: hidden;
  }
  .card.untriaged::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 30%,
      rgba(163, 113, 247, 0.08) 45%,
      rgba(88, 166, 255, 0.12) 50%,
      rgba(163, 113, 247, 0.08) 55%,
      transparent 70%
    );
    animation: shimmer 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .new-tag {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 5px;
    border-radius: 3px;
    background: linear-gradient(135deg, #58a6ff, #a371f7);
    color: #fff;
  }
  .card-top {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-top a { font-size: 12px; font-weight: 700; }
  .card-repo { color: var(--text-muted); font-size: 11px; }
  .card-title {
    font-size: 13px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: all 0.15s;
  }
  .card:hover .card-title {
    -webkit-line-clamp: unset;
    overflow: visible;
  }
  .card:hover .card-meta {
    max-height: 200px;
    overflow: visible;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    padding-top: 4px;
    border-top: 1px solid var(--border);
  }
  .card-badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    align-items: center;
  }
  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
  }
  .card-state {
    border: none;
    border-radius: 10px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    color: #fff;
    background: var(--state-draft);
    opacity: 0.9;
    transition: opacity 0.15s;
  }
  .card-state:hover { opacity: 1; }
  .card-state:focus { outline: none; box-shadow: 0 0 0 2px var(--link); }
  .card-state option { background: var(--surface); color: var(--text); }
  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .card-meta .cherry { color: #a371f7; }
  .card-meta .review { color: #bf8700; }
  .card-meta .review.approved { color: #2da44e; }
  .review-indicator {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
  }
  .review-indicator.approved {
    background: #2da44e20;
    color: #3fb950;
  }
  .review-indicator.changes-requested {
    background: #cf222e18;
    color: #f85149;
  }
  .review-indicator svg { flex-shrink: 0; }
  .ci-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
  }
  .ci-badge svg { flex-shrink: 0; }
  .card-avatar {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid var(--border);
    vertical-align: middle;
    flex-shrink: 0;
  }
  .cherry-pick-tag {
    background: #a371f7;
    color: #fff;
    font-size: 10px;
    padding: 0 4px;
    border-radius: 3px;
    font-weight: 600;
  }
  .author-tag { color: var(--text-muted); font-size: 11px; font-style: italic; }
  .draft-tag {
    background: #768390;
    color: #fff;
    font-size: 10px;
    padding: 0 4px;
    border-radius: 3px;
    font-weight: 600;
  }


  .list-view { display: flex; flex-direction: column; gap: 6px; max-width: 900px; }
  .list-view .card { cursor: default; }
  .list-group { margin-bottom: 20px; }
  .list-group h3 {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .label-tag {
    display: inline-block;
    padding: 0 6px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    color: #fff;
    background: var(--border);
    white-space: nowrap;
  }
  .label-tag.bug { background: #cf222e; }
  .label-tag.feature { background: #1f6feb; }
  .label-tag.priority { background: #bf8700; }
  .empty-state {
    color: var(--text-muted);
    font-size: 14px;
    padding: 40px 20px;
    text-align: center;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  #apply-bar {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--link);
    border-radius: 8px;
    padding: 10px 20px;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    z-index: 100;
  }
  #apply-bar .change-count { font-size: 13px; }
  #apply-bar button {
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .apply-btn { background: #238636; color: #fff; }
  .apply-btn:hover { background: #2ea043; }
  .apply-btn:disabled { opacity: 0.6; cursor: wait; }
  .discard-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border) !important;
  }
  .discard-btn:hover { background: var(--bg); color: var(--text); }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    flex: 0 1 240px;
    transition: border-color 0.15s;
  }
  .search-bar:focus-within { border-color: var(--link); }
  .search-bar input {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 13px;
    outline: none;
    width: 100%;
  }
  .search-bar input::placeholder { color: var(--text-muted); }

  .age-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .age-fresh { background: #2da44e25; color: #3fb950; }
  .age-recent { background: #bf870025; color: #d29922; }
  .age-aging { background: #da3b0125; color: #f0883e; }
  .age-stale { background: #cf222e25; color: #f85149; }

  .ci-history {
    display: inline-flex;
    gap: 2px;
    align-items: center;
    margin-left: 4px;
  }
  .ci-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .ci-dot:first-child {
    width: 8px;
    height: 8px;
  }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    padding: 4px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s, border-color 0.15s;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--text-muted); }
  .refresh-btn:disabled { opacity: 0.6; cursor: wait; }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .toast-container {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    pointer-events: auto;
    animation: toastIn 0.3s ease-out;
    max-width: 360px;
  }
  .toast.toast-out { animation: toastOut 0.3s ease-in forwards; }
  .toast.toast-success { border-left: 3px solid #2da44e; }
  .toast.toast-error { border-left: 3px solid #cf222e; }
  .toast.toast-info { border-left: 3px solid var(--link); }
  .toast svg { flex-shrink: 0; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(40px); }
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,17,23,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    font-size: 16px;
    color: var(--text-muted);
  }
  .loading-overlay.hidden { display: none; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">Loading PR data...</div>
<div class="toast-container" id="toast-container"></div>

<div class="header">
  <h1>PR Dashboard</h1>
  <span class="subtitle" id="last-refreshed"></span>
  <span class="subtitle" id="next-refresh" style="margin-left:4px"></span>
  <div class="search-bar">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="opacity:0.5">
      <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/>
    </svg>
    <input type="text" id="search-input" placeholder="Filter PRs..." oninput="handleSearch(this.value)">
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="refreshFromGitHub()" title="Refresh from GitHub">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 1 1 .908-.418A6 6 0 1 1 8 2v1z"/>
      <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
    </svg>
    Refresh
  </button>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="my-prs" onclick="switchTab('my-prs')">
    My PRs <span class="tab-count" id="my-prs-count"></span>
  </div>
  <div class="tab" data-tab="review-requests" onclick="switchTab('review-requests')">
    Review Requests <span class="tab-count" id="review-requests-count"></span>
  </div>
  <div class="tab" data-tab="assigned-issues" onclick="switchTab('assigned-issues')">
    Assigned Issues <span class="tab-count" id="assigned-issues-count"></span>
  </div>
</div>

<div class="tab-panel active" id="panel-my-prs">
  <div class="filters" id="filters"></div>
  <div class="board" id="board"></div>
</div>


<div class="tab-panel" id="panel-review-requests">
  <div class="board board-3col" id="review-requests-board"></div>
</div>

<div class="tab-panel" id="panel-assigned-issues">
  <div class="board board-3col" id="assigned-issues-board"></div>
</div>

<div id="apply-bar">
  <span id="change-count" class="change-count"></span>
  <button class="apply-btn" id="apply-btn" onclick="applyChanges()">Apply Changes</button>
  <button class="discard-btn" onclick="discardChanges()">Discard</button>
</div>

<script>
const REPO_URLS = {
  "projectcalico/calico": "https://github.com/projectcalico/calico/pull",
  "tigera/operator": "https://github.com/tigera/operator/pull",
  "tigera/calico-private": "https://github.com/tigera/calico-private/pull",
};
const SHORT_REPO = {
  "projectcalico/calico": "calico",
  "tigera/operator": "operator",
  "tigera/calico-private": "calico-private",
};
const PRIORITY_ORDER = ["active", "next-up", "backburner", "parked"];
const PRIORITY_LABELS = {
  "active": "Active",
  "next-up": "Next Up",
  "backburner": "Backburner",
  "parked": "Parked",
};
const PRIORITY_COLORS = {
  "active": "#cf222e",
  "next-up": "#bf8700",
  "backburner": "#768390",
  "parked": "#484f58",
};
const STATE_COLORS = {
  "needs-review": "#bf8700",
  "reviewed": "#cf222e",
  "mergeable": "#2da44e",
  "draft": "#768390",
  "needs-work": "#cf222e",
};
const STATE_SORT_ORDER = {
  "mergeable": 0,
  "reviewed": 1,
  "needs-review": 2,
  "needs-work": 3,
  "draft": 4,
};
const CI_COLORS = {
  "pass": "#2da44e",
  "fail": "#cf222e",
  "pending": "#bf8700",
  "unknown": "#768390",
};
const CI_ICONS = {
  "pass": `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0z"/></svg>`,
  "fail": `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06z"/></svg>`,
  "pending": `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM2 8a6 6 0 1 1 12 0A6 6 0 0 1 2 8zm4.5-1.5a.75.75 0 0 0 0 1.5h3a.75.75 0 0 0 0-1.5h-3z"/></svg>`,
  "unknown": `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13zM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm9-3a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-.25 3a.75.75 0 0 0-1.5 0v3a.75.75 0 0 0 1.5 0V8z"/></svg>`,
};
const REVIEW_ICONS = {
  "approved": `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0z"/></svg>`,
  "changes": `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm11.28-2.28a.75.75 0 0 0-1.06-1.06L7.25 7.63 5.78 6.16a.75.75 0 0 0-1.06 1.06l2 2a.75.75 0 0 0 1.06 0l3.5-3.5z"/></svg>`,
};

// --- Toast notifications ---
function showToast(message, type = "info", duration = 3000) {
  const container = document.getElementById("toast-container");
  const icons = {
    success: `<svg width="14" height="14" viewBox="0 0 16 16" fill="#3fb950"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0z"/></svg>`,
    error: `<svg width="14" height="14" viewBox="0 0 16 16" fill="#f85149"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06z"/></svg>`,
    info: `<svg width="14" height="14" viewBox="0 0 16 16" fill="#58a6ff"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm9-3a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-.25 3a.75.75 0 0 0-1.5 0v3a.75.75 0 0 0 1.5 0V8z"/></svg>`,
  };
  const toast = document.createElement("div");
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `${icons[type] || icons.info}<span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add("toast-out");
    toast.addEventListener("animationend", () => toast.remove());
  }, duration);
}

// --- Triage (dismiss NEW) ---
async function triageCard(key) {
  const pr = ALL_PRS.find(p => prKey(p) === key);
  if (!pr) return;
  pr.triaged = true;
  // Immediately persist without going through the apply bar.
  const t = true;
  try {
    await fetch("/api/prs", {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({changes: [{repo: pr.repo, number: pr.number, triaged: t}]}),
    });
  } catch (e) {
    showToast("Failed to triage: " + e.message, "error");
    return;
  }
  renderMyPrs();

}

// --- Search ---
let searchQuery = "";
function handleSearch(value) {
  searchQuery = value.toLowerCase().trim();
  renderMyPrs();

  renderReviewRequests();
  renderAssignedIssues();
}
function matchesSearch(item) {
  if (!searchQuery) return true;
  const hay = `#${item.number} ${item.title} ${item.short_repo || ""} ${item.repo || ""} ${item.author || ""}`.toLowerCase();
  return hay.includes(searchQuery);
}

// --- Age indicator ---
function ageHtml(createdAt) {
  if (!createdAt) return "";
  const days = Math.floor((Date.now() - new Date(createdAt).getTime()) / 86400000);
  let label, cls;
  if (days < 3) { label = days <= 0 ? "today" : days + "d"; cls = "age-fresh"; }
  else if (days < 14) { label = days + "d"; cls = "age-recent"; }
  else if (days < 30) { label = Math.floor(days / 7) + "w"; cls = "age-aging"; }
  else { label = Math.floor(days / 30) + "mo"; cls = "age-stale"; }
  return `<span class="age-badge ${cls}" title="Opened ${days} days ago">${label}</span>`;
}

// --- CI history sparkline ---
function ciHistoryHtml(history) {
  if (!history) return "";
  const filtered = history.filter(s => s !== "pending");
  if (filtered.length <= 1) return "";
  return `<span class="ci-history" title="CI history (newest first): ${filtered.join(" → ")}">${
    filtered.map(s => `<span class="ci-dot" style="background:${CI_COLORS[s] || "#768390"}"></span>`).join("")
  }</span>`;
}

function ciHtml(ci) {
  const bg = CI_COLORS[ci] || "#768390";
  const icon = CI_ICONS[ci] || CI_ICONS["unknown"];
  return `<span class="ci-badge" style="background:${bg}">${icon} ${ci}</span>`;
}

function reviewIndicatorHtml(reviews) {
  if (!reviews || !reviews.length) return "";
  const hasApproved = reviews.some(r => r.includes("APPROVED"));
  const hasChanges = reviews.some(r => r.includes("CHANGES_REQUESTED"));
  const reviewers = reviews.map(r => r.split(":")[0]);
  if (hasApproved) {
    return `<span class="review-indicator approved">${REVIEW_ICONS.approved} ${reviewers.join(", ")}</span>`;
  }
  if (hasChanges) {
    return `<span class="review-indicator changes-requested">${REVIEW_ICONS.changes} ${reviewers.join(", ")}</span>`;
  }
  return "";
}

const ITEM_PRIORITY_ORDER = ["active", "next-up", "low-priority"];
const ITEM_PRIORITY_LABELS = {
  "active": "Active",
  "next-up": "Next Up",
  "low-priority": "Low Priority",
};
const ITEM_PRIORITY_COLORS = {
  "active": "#cf222e",
  "next-up": "#bf8700",
  "low-priority": "#768390",
};

let ALL_PRS = [];
let REVIEW_REQUESTS = [];
let ASSIGNED_ISSUES = [];
let currentPriority = {};
const pendingChanges = {};
const pendingItemChanges = {};

const activeFilters = { state: null, ci: null };

function prKey(pr) {
  return `${pr.short_repo}#${pr.number}`;
}

function shortRepo(name) {
  return SHORT_REPO[name] || name.split("/").pop();
}

// flattenPRs transforms TrackerData into a flat list matching the render functions' expectations.
function flattenPRs(data) {
  const prs = [];
  for (const repo of (data.repos || [])) {
    for (const pr of (repo.prs || [])) {
      const reviews = pr.reviews || [];
      const hasApproved = reviews.some(r => r.includes("APPROVED"));
      const hasChanges = reviews.some(r => r.includes("CHANGES_REQUESTED"));
      let reviewState = "none";
      if (hasApproved) reviewState = "approved";
      else if (hasChanges) reviewState = "changes-requested";

      prs.push({
        number: pr.number,
        title: pr.title || "",
        repo: repo.name,
        short_repo: shortRepo(repo.name),
        url: `${REPO_URLS[repo.name] || ""}/${pr.number}`,
        state: pr.state || "",
        priority: pr.priority || "backburner",
        ci: pr.ci || "unknown",
        ci_history: pr.ci_history || [],
        created_at: pr.created_at || "",
        reviews: reviews,
        review_state: reviewState,
        notes: pr.notes || "",
        cherry_pick_of: pr.cherry_pick_of || "",
        depends_on: pr.depends_on || [],
        blocks: pr.blocks || [],
        author: pr.author || "",
        triaged: pr.triaged || false,
      });
    }
  }
  return prs;
}

let lastRefreshedISO = "";

function timeAgo(iso) {
  if (!iso) return "unknown";
  const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  return Math.floor(diff / 86400) + "d ago";
}

// Keep the "Updated Xm ago" label fresh.
setInterval(() => {
  if (lastRefreshedISO) {
    document.getElementById("last-refreshed").textContent =
      "Updated " + timeAgo(lastRefreshedISO);
  }
}, 30000);

async function loadData() {
  const resp = await fetch("/api/prs");
  if (!resp.ok) {
    console.error("Failed to load PR data:", resp.status);
    return;
  }
  const data = await resp.json();

  ALL_PRS = flattenPRs(data);
  REVIEW_REQUESTS = (data.review_requests || []).map(rr => ({
    ...rr,
    short_repo: shortRepo(rr.repo),
    url: rr.url || `${REPO_URLS[rr.repo] || ""}/${rr.number}`,
  }));
  ASSIGNED_ISSUES = (data.assigned_issues || []).map(issue => ({
    ...issue,
    short_repo: shortRepo(issue.repo),
  }));

  currentPriority = {};
  ALL_PRS.forEach(pr => { currentPriority[prKey(pr)] = pr.priority; });

  lastRefreshedISO = data.last_refreshed || "";
  document.getElementById("last-refreshed").textContent =
    "Updated " + timeAgo(lastRefreshedISO);

  renderMyPrs();

  renderReviewRequests();
  renderAssignedIssues();
  document.getElementById("loading-overlay").classList.add("hidden");
}

function markChanged(pr, field, value) {
  const key = prKey(pr);
  if (!pendingChanges[key]) pendingChanges[key] = {repo: pr.repo, number: pr.number};
  if (value === pr[field]) {
    delete pendingChanges[key][field];
    if (Object.keys(pendingChanges[key]).length <= 2) delete pendingChanges[key];
  } else {
    pendingChanges[key][field] = value;
  }
  updateApplyBar();
}

function updateApplyBar() {
  const bar = document.getElementById("apply-bar");
  const count = Object.keys(pendingChanges).length + Object.keys(pendingItemChanges).length;
  if (count > 0) {
    bar.style.display = "flex";
    document.getElementById("change-count").textContent =
      count === 1 ? "1 PR changed" : `${count} PRs changed`;
  } else {
    bar.style.display = "none";
  }
}

async function applyChanges() {
  const btn = document.getElementById("apply-btn");
  btn.disabled = true;
  btn.textContent = "Applying...";

  const changes = Object.values(pendingChanges).map(c => {
    const entry = {repo: c.repo, number: c.number};
    if (c.state) entry.state = c.state;
    if (c.priority) entry.priority = c.priority;
    if (c.notes !== undefined) entry.notes = c.notes;
    return entry;
  });

  try {
    const resp = await fetch("/api/prs", {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({changes, item_changes: Object.values(pendingItemChanges)}),
    });
    if (resp.ok) {
      const count = Object.keys(pendingChanges).length + Object.keys(pendingItemChanges).length;
      Object.keys(pendingChanges).forEach(k => delete pendingChanges[k]);
      Object.keys(pendingItemChanges).forEach(k => delete pendingItemChanges[k]);
      updateApplyBar();
      await loadData();
      showToast(`Applied ${count} change${count !== 1 ? "s" : ""}`, "success");
    } else {
      const err = await resp.json();
      showToast("Failed to apply: " + (err.error || resp.status), "error", 5000);
    }
  } finally {
    btn.disabled = false;
    btn.textContent = "Apply Changes";
  }
}

function discardChanges() {
  Object.keys(pendingChanges).forEach(k => delete pendingChanges[k]);
  Object.keys(pendingItemChanges).forEach(k => delete pendingItemChanges[k]);
  ALL_PRS.forEach(pr => { currentPriority[prKey(pr)] = pr.priority; });
  updateApplyBar();
  renderMyPrs();

}

async function refreshFromGitHub() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  btn.disabled = true;
  try {
    const resp = await fetch("/api/refresh", {method: "POST"});
    if (resp.ok) {
      // Clear pending changes since we just got fresh data.
      Object.keys(pendingChanges).forEach(k => delete pendingChanges[k]);
      updateApplyBar();
      await loadData();
      resetRefreshTimer();
      showToast("Refreshed from GitHub", "success");
    } else {
      const err = await resp.json();
      showToast("Refresh failed: " + (err.error || resp.status), "error", 5000);
    }
  } finally {
    btn.classList.remove("spinning");
    btn.disabled = false;
  }
}

// --- Tab switching ---
function switchTab(tabId) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add("active");
  document.getElementById(`panel-${tabId}`).classList.add("active");
}

// --- Drag and drop ---
let draggedPrKey = null;

function handleDragStart(e) {
  const card = e.target.closest(".card");
  if (!card) return;
  draggedPrKey = card.dataset.prkey;
  card.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", draggedPrKey);
}

function handleDragEnd(e) {
  const card = e.target.closest(".card");
  if (card) card.classList.remove("dragging");
  document.querySelectorAll(".column.drag-over").forEach(c => c.classList.remove("drag-over"));
  draggedPrKey = null;
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  const col = e.target.closest(".column");
  if (col) col.classList.add("drag-over");
}

function handleDragLeave(e) {
  const col = e.target.closest(".column");
  if (col && !col.contains(e.relatedTarget)) {
    col.classList.remove("drag-over");
  }
}

function handleDrop(e) {
  e.preventDefault();
  const col = e.target.closest(".column");
  if (!col) return;
  col.classList.remove("drag-over");
  const newPriority = col.dataset.priority;
  const key = e.dataTransfer.getData("text/plain");
  if (!key || !newPriority) return;
  const pr = ALL_PRS.find(p => prKey(p) === key);
  if (!pr) return;
  currentPriority[key] = newPriority;
  markChanged(pr, "priority", newPriority);
  renderMyPrs();
}

// --- State change handler ---
function handleStateChange(el) {
  const key = el.dataset.prkey;
  const pr = ALL_PRS.find(p => prKey(p) === key);
  if (!pr) return;
  el.style.background = STATE_COLORS[el.value] || "#768390";
  markChanged(pr, "state", el.value);
  const card = el.closest(".card");
  if (card) {
    card.classList.toggle("changed", !!pendingChanges[prKey(pr)]);
    // Update state class on card
    const states = ["mergeable", "reviewed", "needs-review", "needs-work", "draft"];
    states.forEach(s => card.classList.remove(`state-${s}`));
    card.classList.add(`state-${el.value}`);
  }
}

// --- Rendering: My PRs ---
function renderCard(pr) {
  const key = prKey(pr);
  const isChanged = !!pendingChanges[key];
  const currentState = pendingChanges[key]?.state || pr.state;
  const stateColor = STATE_COLORS[currentState] || "#768390";

  const states = ["mergeable", "reviewed", "needs-review", "needs-work", "draft"];
  const stateOpts = states.map(s =>
    `<option value="${s}" ${s === currentState ? "selected" : ""}>${s}</option>`
  ).join("");

  let meta = [];
  if (pr.cherry_pick_of) {
    const m = pr.cherry_pick_of.match(/^(.+?)#(\d+)$/);
    if (m) {
      const cpUrl = `https://github.com/${m[1]}/pull/${m[2]}`;
      meta.push(`<span class="cherry">cherry-pick of <a href="${cpUrl}" target="_blank">${pr.cherry_pick_of}</a></span>`);
    } else {
      meta.push(`<span class="cherry">cherry-pick of ${pr.cherry_pick_of}</span>`);
    }
  }
  if (pr.depends_on?.length) meta.push(`depends on: ${pr.depends_on.join(", ")}`);
  if (pr.blocks?.length) meta.push(`blocks: ${pr.blocks.join(", ")}`);
  if (pr.notes) meta.push(pr.notes);

  const isCherryPick = !!(pr.cherry_pick_of || /^\[v\d+\.\d+\]/.test(pr.title));
  const cherryPickTag = isCherryPick ? `<span class="cherry-pick-tag">CHERRY-PICK</span>` : "";
  const avatarHtml = pr.author && pr.author !== "caseydavenport"
    ? `<img class="card-avatar" src="https://github.com/${pr.author}.png?size=36" alt="${pr.author}" title="${pr.author}">`
    : "";
  const reviewHtml = reviewIndicatorHtml(pr.reviews);

  const age = ageHtml(pr.created_at);
  const ciHistory = ciHistoryHtml(pr.ci_history);
  const isUntriaged = !pr.triaged && !isChanged;
  const isReadyToMerge = (currentState === "mergeable" && pr.ci === "pass") || isCherryPick;
  const newTag = isUntriaged ? `<span class="new-tag" onclick="event.stopPropagation(); triageCard('${key}')" style="cursor:pointer" title="Click to dismiss">NEW</span>` : "";

  const visualState = isCherryPick ? "mergeable" : currentState;
  return `<div class="card state-${visualState} ${isChanged ? "changed" : ""} ${isUntriaged ? "untriaged" : ""} ${isReadyToMerge ? "ready-to-merge" : ""}" draggable="true"
    data-prkey="${key}"
    ondragstart="handleDragStart(event)"
    ondragend="handleDragEnd(event)">
    <div class="card-top">
      ${avatarHtml}
      <a href="${pr.url}" target="_blank">#${pr.number}</a>
      <span class="card-repo">${pr.short_repo}</span>
      ${newTag}
      ${age}
      ${cherryPickTag}
      ${reviewHtml}
    </div>
    <div class="card-title">${pr.title}</div>
    ${meta.length ? `<div class="card-meta">${meta.join(" &middot; ")}</div>` : ""}
    <div class="card-footer">
      <select class="card-state" style="background:${stateColor}"
        data-prkey="${key}" onchange="handleStateChange(this)">
        ${stateOpts}
      </select>
      <div class="card-badges">${ciHtml(pr.ci)}${ciHistory}</div>
    </div>
  </div>`;
}

function toggleFilter(type, value) {
  activeFilters[type] = activeFilters[type] === value ? null : value;
  renderFilters();
  renderMyPrs();
}

function renderFilters() {
  const regular = ALL_PRS;

  // Count states and CI statuses across all regular PRs.
  const stateCounts = {};
  const ciCounts = {};
  regular.forEach(pr => {
    const s = pendingChanges[prKey(pr)]?.state || pr.state;
    stateCounts[s] = (stateCounts[s] || 0) + 1;
    ciCounts[pr.ci] = (ciCounts[pr.ci] || 0) + 1;
  });

  const stateOrder = ["mergeable", "reviewed", "needs-review", "needs-work", "draft"];
  const ciOrder = ["pass", "fail", "pending", "unknown"];

  const stateButtons = stateOrder
    .filter(s => stateCounts[s])
    .map(s => {
      const color = STATE_COLORS[s] || "#768390";
      const active = activeFilters.state === s ? "active" : "";
      return `<button class="filter-btn ${active}" style="border-color:${active ? color : ''};color:${active ? color : ''}" onclick="toggleFilter('state','${s}')">${s} <span style="opacity:0.6">${stateCounts[s]}</span></button>`;
    }).join("");

  const ciButtons = ciOrder
    .filter(c => ciCounts[c])
    .map(c => {
      const color = CI_COLORS[c] || "#768390";
      const active = activeFilters.ci === c ? "active" : "";
      return `<button class="filter-btn ${active}" style="border-color:${active ? color : ''};color:${active ? color : ''}" onclick="toggleFilter('ci','${c}')">${c} <span style="opacity:0.6">${ciCounts[c]}</span></button>`;
    }).join("");

  document.getElementById("filters").innerHTML =
    `<div class="filter-group"><span class="filter-label">State</span>${stateButtons}</div>` +
    `<div class="filter-sep"></div>` +
    `<div class="filter-group"><span class="filter-label">CI</span>${ciButtons}</div>`;
}

function renderMyPrs() {
  const board = document.getElementById("board");
  let regular = ALL_PRS;

  // Apply search filter.
  regular = regular.filter(matchesSearch);

  // Apply active filters.
  if (activeFilters.state) {
    regular = regular.filter(pr => (pendingChanges[prKey(pr)]?.state || pr.state) === activeFilters.state);
  }
  if (activeFilters.ci) {
    regular = regular.filter(pr => pr.ci === activeFilters.ci);
  }

  renderFilters();

  const grouped = {};
  PRIORITY_ORDER.forEach(p => grouped[p] = []);
  regular.forEach(pr => {
    const p = currentPriority[prKey(pr)] || pr.priority;
    if (grouped[p]) grouped[p].push(pr);
    else grouped["backburner"].push(pr);
  });

  board.innerHTML = PRIORITY_ORDER.map(p => {
    const color = PRIORITY_COLORS[p];
    const label = PRIORITY_LABELS[p];
    grouped[p].sort((a, b) => {
      const sa = STATE_SORT_ORDER[pendingChanges[prKey(a)]?.state || a.state] ?? 99;
      const sb = STATE_SORT_ORDER[pendingChanges[prKey(b)]?.state || b.state] ?? 99;
      return sa - sb;
    });
    const cards = grouped[p].map(renderCard).join("");
    return `<div class="column" data-priority="${p}"
      ondragover="handleDragOver(event)"
      ondragleave="handleDragLeave(event)"
      ondrop="handleDrop(event)">
      <div class="column-header" style="color:${color}">
        ${label} <span class="count">${grouped[p].length}</span>
      </div>
      <div class="column-cards">${cards}</div>
    </div>`;
  }).join("");

  document.getElementById("my-prs-count").textContent = regular.length;
}


// --- Item priority helpers (review requests + assigned issues) ---
function itemKey(type, item) {
  return `${type}:${item.short_repo}#${item.number}`;
}

function getItemPriority(type, item) {
  const key = itemKey(type, item);
  if (pendingItemChanges[key]) return pendingItemChanges[key].priority;
  return item.priority || "next-up";
}

function setItemPriority(type, item, newPriority) {
  const key = itemKey(type, item);
  const orig = item.priority || "next-up";
  if (newPriority === orig) {
    delete pendingItemChanges[key];
  } else {
    pendingItemChanges[key] = {type, repo: item.repo, number: item.number, priority: newPriority};
  }
  updateApplyBar();
}

function renderItemBoard(boardId, items, type, renderCardFn) {
  const board = document.getElementById(boardId);
  const grouped = {};
  ITEM_PRIORITY_ORDER.forEach(p => grouped[p] = []);
  items.forEach(item => {
    const p = getItemPriority(type, item);
    if (grouped[p]) grouped[p].push(item);
    else grouped["next-up"].push(item);
  });

  board.innerHTML = ITEM_PRIORITY_ORDER.map(p => {
    const color = ITEM_PRIORITY_COLORS[p];
    const label = ITEM_PRIORITY_LABELS[p];
    const cards = grouped[p].map(renderCardFn).join("");
    return `<div class="column" data-priority="${p}" data-item-type="${type}"
      ondragover="handleItemDragOver(event)"
      ondragleave="handleItemDragLeave(event)"
      ondrop="handleItemDrop(event)">
      <div class="column-header" style="color:${color}">
        ${label} <span class="count">${grouped[p].length}</span>
      </div>
      <div class="column-cards">${cards}</div>
    </div>`;
  }).join("");
}

// Item drag-and-drop
function handleItemDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  const col = e.target.closest(".column");
  if (col) col.classList.add("drag-over");
}
function handleItemDragLeave(e) {
  const col = e.target.closest(".column");
  if (col && !col.contains(e.relatedTarget)) col.classList.remove("drag-over");
}
function handleItemDrop(e) {
  e.preventDefault();
  const col = e.target.closest(".column");
  if (!col) return;
  col.classList.remove("drag-over");
  const newPriority = col.dataset.priority;
  const itemType = col.dataset.itemType;
  const data = e.dataTransfer.getData("text/plain");
  if (!data || !newPriority) return;
  const items = itemType === "review_request" ? REVIEW_REQUESTS : ASSIGNED_ISSUES;
  const item = items.find(i => itemKey(itemType, i) === data);
  if (!item) return;
  setItemPriority(itemType, item, newPriority);
  if (itemType === "review_request") renderReviewRequests();
  else renderAssignedIssues();
}

// --- Rendering: Review Requests ---
function renderReviewRequests() {
  document.getElementById("review-requests-count").textContent = REVIEW_REQUESTS.length;
  const filtered = REVIEW_REQUESTS.filter(matchesSearch);
  if (!filtered.length) {
    document.getElementById("review-requests-board").innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">${searchQuery ? "No matching review requests" : "No pending review requests"}</div>`;
    return;
  }
  renderItemBoard("review-requests-board", filtered, "review_request", rr => {
    const draftTag = rr.draft ? `<span class="draft-tag">DRAFT</span>` : "";
    const key = itemKey("review_request", rr);
    const isChanged = !!pendingItemChanges[key];
    return `<div class="card ${isChanged ? "changed" : ""}" draggable="true"
      data-prkey="${key}"
      ondragstart="handleDragStart(event)"
      ondragend="handleDragEnd(event)">
      <div class="card-top">
        <a href="${rr.url}" target="_blank">#${rr.number}</a>
        <span class="card-repo">${rr.short_repo}</span>
        ${draftTag}
      </div>
      <div class="card-title">${rr.title}</div>
      <div class="card-footer">
        <span class="author-tag">by ${rr.author}</span>
        ${ciHtml(rr.ci)}
      </div>
    </div>`;
  });
}

// --- Rendering: Assigned Issues ---
function labelClass(label) {
  const l = label.toLowerCase();
  if (l.includes("bug")) return "bug";
  if (l.includes("feature") || l.includes("enhancement")) return "feature";
  if (l.includes("priority")) return "priority";
  return "";
}

function renderAssignedIssues() {
  document.getElementById("assigned-issues-count").textContent = ASSIGNED_ISSUES.length;
  const filteredIssues = ASSIGNED_ISSUES.filter(matchesSearch);
  if (!filteredIssues.length) {
    document.getElementById("assigned-issues-board").innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">${searchQuery ? "No matching issues" : "No assigned issues"}</div>`;
    return;
  }
  renderItemBoard("assigned-issues-board", filteredIssues, "assigned_issue", issue => {
    const labels = (issue.labels || []).map(l =>
      `<span class="label-tag ${labelClass(l)}">${l}</span>`
    ).join(" ");
    const key = itemKey("assigned_issue", issue);
    const isChanged = !!pendingItemChanges[key];
    return `<div class="card ${isChanged ? "changed" : ""}" draggable="true"
      data-prkey="${key}"
      ondragstart="handleDragStart(event)"
      ondragend="handleDragEnd(event)">
      <div class="card-top">
        <a href="${issue.url}" target="_blank">#${issue.number}</a>
        <span class="card-repo">${issue.short_repo}</span>
      </div>
      <div class="card-title">${issue.title}</div>
      ${labels ? `<div class="card-footer">${labels}</div>` : ""}
    </div>`;
  });
}

// Initial load
loadData();

// Auto-refresh every 10 minutes.
const REFRESH_INTERVAL_MS = 10 * 60 * 1000;
let nextRefreshTime = Date.now() + REFRESH_INTERVAL_MS;

function resetRefreshTimer() {
  nextRefreshTime = Date.now() + REFRESH_INTERVAL_MS;
}

setInterval(() => {
  const remaining = Math.max(0, Math.round((nextRefreshTime - Date.now()) / 1000));
  const el = document.getElementById("next-refresh");
  if (remaining <= 0) {
    el.textContent = "· refreshing…";
  } else {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    el.textContent = "· next refresh in " + m + ":" + (s < 10 ? "0" : "") + s;
  }
}, 1000);

setInterval(() => {
  if (Object.keys(pendingChanges).length === 0 && Object.keys(pendingItemChanges).length === 0) {
    refreshFromGitHub();
    resetRefreshTimer();
  } else {
    resetRefreshTimer();
  }
}, REFRESH_INTERVAL_MS);
</script>
</body>
</html>
